# Every field below is pinned by resourcecensus.bootstrapPolicy. Changing this
# manifest alone fails; an intentional policy change updates the Go policy,
# this file, and the generated TESTING.md table under council review.

# These broad rows retain the audit's point-in-time source needles. They do
# not classify tests. The AST baselines below ignore comments and strings;
# reported_* preserves the historical regex totals for comparison.
