name: Close stale needs-info / needs-repro issues

on:
  schedule:
    - cron: '37 9 * * *'
  workflow_dispatch:

permissions: {}

jobs:
  close-needs-info:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Close stale needs-info issues (14 days)
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const labels = ['status/needs-info', 'status/needs-repro'];
            const days = 14;
            const cutoff = new Date(Date.now() - days * 24 * 60 * 60 * 1000);

            for (const label of labels) {
              const issues = await github.paginate(github.rest.issues.listForRepo, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                labels: label,
                per_page: 100,
              });

              for (const issue of issues) {
                if (issue.pull_request) continue;

                const events = await github.paginate(github.rest.issues.listEvents, {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  per_page: 100,
                });

                const labelEvents = events
                  .filter(e => e.event === 'labeled' && e.label?.name === label);
                if (labelEvents.length === 0) continue;

                const labeledAt = new Date(Math.max(
                  ...labelEvents.map(e => new Date(e.created_at).getTime())
                ));

                const comments = await github.paginate(github.rest.issues.listComments, {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  since: labeledAt.toISOString(),
                  per_page: 100,
                });

                const visibleRequest = comments.find(c => {
                  if (c.user?.login === issue.user?.login) return false;
                  const lower = (c.body || '').toLowerCase();
                  if (lower.includes('closing')) return false;
                  if (!/14\s*-?\s*days?/.test(lower)) return false;
                  if (!lower.includes('reply') && !lower.includes('respond')) return false;
                  if (label === 'status/needs-repro') return lower.includes('repro') || lower.includes('reproduction');
                  return lower.includes('info') || lower.includes('information') || lower.includes('details');
                });

                if (!visibleRequest) {
                  console.log(`No visible request for #${issue.number} (${label}), skipping.`);
                  continue;
                }

                const requestAt = new Date(visibleRequest.created_at);
                if (requestAt > cutoff) continue;

                const authorReplied = comments.some(c =>
                  c.user?.login === issue.user?.login &&
                  new Date(c.created_at) > requestAt
                );
                if (authorReplied) continue;

                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `Closing — this was marked \`${label}\` and a response was requested 14 or more days ago with no reply.\n\nIf this is still relevant, please reply with the requested details and we'll reopen.`,
                });

                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed',
                  state_reason: 'not_planned',
                });
                console.log(`Closed #${issue.number} (${label}, requested ${requestAt.toISOString()})`);
              }
            }
