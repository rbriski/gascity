# Runtime secrets for the city-provisioner, materialized by ESO from bao.ops (product-eu), delivered
# as FILE mounts (B3 INFRA 3). Seed these in OpenBao BEFORE this syncs (see RUNBOOK.md).
#
# BLAST RADIUS NOTE (design open-Q3): the org-tokens secret mounts ALL enrolled orgs' provisioningTokens
# in one pod. A compromise exposes mint authority for those orgs' crucible+beads products only (fully
# audited + instantly revocable), never platform-wide. The hardening (mount only this-pass discovered
# orgs) is a fast-follow needing an on-demand fetch path.
---
# The durable PLATFORM discovery key: a crucible per-app key carrying ONLY crucible:city.provision.
# Bootstrapped once (RUNBOOK.md) — it is platform/machine-only and cannot be self-minted via the org
# plane. Materialized to a single file key the deployment mounts at /etc/city-provisioner/platform/key.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: city-provisioner-platform-key
  namespace: city-provisioner
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: bao-product-eu
  target:
    name: city-provisioner-platform-key
    creationPolicy: Owner
  data:
    - secretKey: key
      remoteRef:
        key: apps/identity-v0/city-provisioner/platform
        property: key
---
# The per-org B0 provisioningTokens. dataFrom.find pulls every secret under the org-tokens prefix into
# one k8s Secret, each as a key named by its org_id — so the mounted dir has one file per enrolled org
# (filename == org_id). Enroll an org by seeding apps/identity-v0/city-provisioner/org-tokens/<org_id>
# in OpenBao; ESO syncs it in and the provisioner picks it up on the next pass.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: city-provisioner-org-tokens
  namespace: city-provisioner
spec:
  refreshInterval: 10m
  secretStoreRef:
    kind: ClusterSecretStore
    name: bao-product-eu
  target:
    name: city-provisioner-org-tokens
    creationPolicy: Owner
  dataFrom:
    - find:
        path: apps/identity-v0/city-provisioner/org-tokens/
        name:
          # org_<uuidv7>-shaped keys only.
          regexp: "^org_[A-Za-z0-9]+$"
---
# GHCR pull credentials for the private city-provisioner image (same source the other identity-v0 apps use).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ghcr-pull
  namespace: city-provisioner
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: bao-product-eu
  target:
    name: ghcr-pull
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {"auths":{"{{ .registry }}":{"username":"{{ .username }}","password":"{{ .password }}","auth":"{{ printf "%s:%s" .username .password | b64enc }}"}}}
  data:
    - secretKey: username
      remoteRef: {key: apps/identity-v0/ghcr-pull, property: username}
    - secretKey: password
      remoteRef: {key: apps/identity-v0/ghcr-pull, property: password}
    - secretKey: registry
      remoteRef: {key: apps/identity-v0/ghcr-pull, property: registry}
